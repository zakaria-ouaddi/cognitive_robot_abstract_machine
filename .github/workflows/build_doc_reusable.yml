name: Build Doc Reusable

on:
  workflow_call:
    inputs:
      lib:
        description: "Library folder name"
        required: true
        type: string
      doc_path:
        description: "Path to documentation source relative to library folder"
        required: true
        type: string
      artifact_name:
        description: "Name of the artifact to upload"
        required: true
        type: string
      use_container:
        description: "Whether to use the semantic_world container"
        required: false
        type: boolean
        default: false


jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.use_container && format('ghcr.io/{0}:jazzy', github.repository) || '' }}
    defaults:
      run:
        shell: ${{ inputs.use_container && 'bash -ieo pipefail {0}' || 'bash' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: '.'
          submodules: 'true'

      - name: Initialize submodules explicitly
        run: |
          git config --global --add safe.directory "*"
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Set up Python (Non-container)
        if: ${{ !inputs.use_container }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Node.js (Container only)
        if: ${{ inputs.use_container }}
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Graphviz
        if: ${{ inputs.lib == 'coraplex' || inputs.lib == 'probabilistic_model' || inputs.lib == 'random_events' || inputs.lib == 'krrood' || inputs.lib == 'semantic_digital_twin' }}
        run: |
          sudo apt-get update
          sudo apt-get install graphviz libgraphviz-dev -y

      - name: Install dependencies (Non-container)
        if: ${{ !inputs.use_container }}
        run: |
          pip install -U pip uv
          # uv resolves the workspace via [tool.uv.sources], installing every
          # member editable from local paths; the doc tooling comes from the
          # root project's [project.optional-dependencies] "doc" extra.
          uv sync --extra doc
          uv pip install pybind11 pygraphviz

      - name: Install dependencies (Container)
        if: ${{ inputs.use_container }}
        run: |
          sudo apt-get update
          source /opt/ros/cram-env/bin/activate
          pip install -U pip uv
          uv sync --extra doc --active --inexact
          uv pip install pygraphviz

      - name: Strip exercise-tagged cells (semantic_digital_twin only)
        if: ${{ inputs.lib == 'semantic_digital_twin' }}
        run: |
          cd $GITHUB_WORKSPACE/semantic_digital_twin/doc/self_assessment/exercises
          source /opt/ros/cram-env/bin/activate
          find . -type f -name '*.md' -print0 | while IFS= read -r -d '' f; do
            ipynb="${f%.md}.ipynb"
            jupytext --from md:myst --to ipynb "$f" -o "$ipynb"
            jupyter nbconvert --config $GITHUB_WORKSPACE/semantic_digital_twin/scripts/configs/nb_remove_exercises.json \
              --to notebook --inplace \
              "$ipynb"
            jupytext --to md:myst "$ipynb" -o "$f"
            rm -f "$ipynb"
          done

      - name: Build the book (Non-container)
        if: ${{ !inputs.use_container }}
        run: |
          # --no-sync so uv does not re-resolve and drop the pip-installed pygraphviz
          uv run --no-sync jupyter-book build ${{ inputs.lib }}/${{ inputs.doc_path }}

      - name: Build the book (Container)
        if: ${{ inputs.use_container }}
        run: |
          source /opt/ros/overlay_ws/install/setup.bash
          source /opt/ros/cram-env/bin/activate
          cd $GITHUB_WORKSPACE/${{ inputs.lib }}
          jupyter-book build ${{ inputs.doc_path }}

      - name: Upload artifact (Non-container)
        if: ${{ !inputs.use_container && !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: "${{ inputs.lib }}/${{ inputs.doc_path }}/_build/html"

      - name: Upload artifact (Container)
        if: ${{ inputs.use_container && (github.event_name == 'push' || github.event_name == 'workflow_call') }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: "${{ inputs.lib }}/${{ inputs.doc_path }}/_build/html"
